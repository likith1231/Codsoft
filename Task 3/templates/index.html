<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS AI Intelligence</title>

<style>

body{
margin:0;
height:100vh;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background: radial-gradient(circle at 20% 20%, #1e3a8a, #020617);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* glass card */

.card{
width:540px;
padding:40px;
border-radius:28px;
background:rgba(255,255,255,0.06);
backdrop-filter: blur(25px);
box-shadow:
0 40px 80px rgba(0,0,0,.6),
inset 0 1px rgba(255,255,255,.15);
border:1px solid rgba(255,255,255,.08);
transition:.4s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 60px 120px rgba(0,0,0,.8);
}

h2{
margin-top:0;
font-weight:600;
letter-spacing:.5px;
}

/* textarea */

textarea{
width:100%;
height:140px;
border-radius:18px;
border:none;
outline:none;
padding:18px;
margin-top:18px;
font-size:14px;
background:rgba(0,0,0,.5);
color:white;
box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
}

/* button */

button{
margin-top:20px;
background:linear-gradient(135deg,#3b82f6,#06b6d4);
border:none;
color:white;
padding:14px 28px;
border-radius:14px;
font-size:15px;
cursor:pointer;
box-shadow:0 10px 25px rgba(59,130,246,.4);
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

/* result */

.result{
margin-top:28px;
padding:22px;
border-radius:20px;
font-size:15px;
backdrop-filter:blur(20px);
}

.safe{
background:linear-gradient(135deg,#16a34a,#4ade80);
}

.spam{
background:linear-gradient(135deg,#dc2626,#f87171);
}

/* history button */

.history{
display:inline-block;
margin-top:20px;
text-decoration:none;
padding:10px 20px;
border-radius:12px;
background:rgba(255,255,255,.08);
color:white;
}

</style>
</head>

<body>

<div class="card">

<h2>📡 SMS Spam Intelligence</h2>
<p style="opacity:.7">AI detection using TF-IDF + Naive Bayes</p>

<form method="post">
<textarea name="message" placeholder="Paste SMS text here...">{{message}}</textarea>
<button>Analyze Message</button>
</form>

{% if result %}
<div class="result {% if 'Legitimate' in result %}safe{% else %}spam{% endif %}">
<strong>{{result}}</strong><br>
Confidence : {{confidence}} %
</div>

<a href="/history" class="history">View Detection History</a>
{% endif %}

</div>

</body>
</html>
