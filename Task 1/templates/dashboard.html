<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fraud Dashboard</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background: linear-gradient(135deg,#1e3c72,#2a5298);
min-height:100vh;
font-family:Segoe UI;
color:white;
}

.dashboard-box{
background:white;
color:black;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.stat-card{
border-radius:12px;
padding:15px;
background:#f8f9fa;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.chart-box{
max-width:400px;
margin:auto;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">
📊 Fraud Analytics Dashboard
</h2>

<div class="dashboard-box">

<div class="row text-center mb-4">

<div class="col-md-3">
<div class="stat-card">
<h6>Total Fraud</h6>
<h3 class="text-danger">{{ fraud }}</h3>
</div>
</div>

<div class="col-md-3">
<div class="stat-card">
<h6>Legitimate</h6>
<h3 class="text-success">{{ legit }}</h3>
</div>
</div>

<div class="col-md-3">
<div class="stat-card">
<h6>Accuracy</h6>
<h3 class="text-primary">{{ accuracy }}%</h3>
</div>
</div>

<div class="col-md-3">
<div class="stat-card">
<h6>Avg Amount</h6>
<h3 class="text-warning">${{ avg_amt }}</h3>
</div>
</div>
</div>
</div>

<div class="text-center mt-4">
<a href="/predict" class="btn btn-light">
🔍 New Prediction
</a>
</div>

</div>

<div class="chart-box text-center"
     data-legit="{{ legit }}"
     data-fraud="{{ fraud }}">
     
    <canvas id="fraudChart"></canvas>

</div>

<script>

const chartBox = document.querySelector(".chart-box");

const legit = parseInt(chartBox.dataset.legit);
const fraud = parseInt(chartBox.dataset.fraud);

new Chart(document.getElementById("fraudChart"), {
    type:"doughnut",
    data:{
        labels:["Legitimate","Fraud"],
        datasets:[{
            data:[legit, fraud],
            backgroundColor:["#28a745","#dc3545"]
        }]
    },
    options:{
        responsive:true,
        plugins:{
            legend:{ position:"bottom" }
        }
    }
});

</script>

</body>
</html>
