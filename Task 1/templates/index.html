<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fraud Prediction</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background: linear-gradient(135deg,#3a1c71,#d76d77,#ffaf7b);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Segoe UI;
}

.form-box{
background:white;
padding:30px;
border-radius:15px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="form-box">

<h3 class="text-center mb-4">💳 Fraud Prediction</h3>

<form action="/predict" method="post">

<div class="mb-3">
<label class="form-label">Transaction Amount</label>
<input type="number" step="any" name="amt"
class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">City Population</label>
<input type="number" name="city_pop"
class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Latitude</label>
<input type="number" step="any" name="lat"
class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Longitude</label>
<input type="number" step="any" name="long"
class="form-control" required>
</div>

<button class="btn btn-dark w-100 mt-2">
Predict Transaction
</button>

</form>

{% if prediction_text %}
<div class="alert alert-info mt-3 text-center">
{{ prediction_text }}
</div>
{% endif %}

</div>

</body>
</html>
