<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Predict Fraud</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(120deg,#1d2671,#c33764);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Segoe UI;
}

.card{
border-radius:20px;
padding:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="card col-md-4">

<h3 class="text-center mb-4">💳 Fraud Prediction</h3>

<form method="post">

<input class="form-control mb-3" type="number" step="any" name="amt" placeholder="Transaction Amount" required>

<input class="form-control mb-3" type="number" name="city_pop" placeholder="City Population" required>

<input class="form-control mb-3" type="number" step="any" name="lat" placeholder="Latitude" required>

<input class="form-control mb-3" type="number" step="any" name="long" placeholder="Longitude" required>

<button class="btn btn-dark w-100">Predict</button>

</form>

{% if prediction_text %}

<div class="alert alert-info text-center mt-4">
<b>{{ prediction_text }}</b>
</div>

{% endif %}

</div>

</body>
</html>
